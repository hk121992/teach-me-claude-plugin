<!DOCTYPE html>
<!--
  Teach Me Claude — journey map widget (template).
  The companion instantiates this into the learner's workspace:
  replace the __PROGRESS_DATA__ placeholder below with the actual JSON
  contents of .teach-me/progress.json, save as my-journey.html, and invite
  the learner to open it in their browser. Render real progress only.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Teach Me Claude journey</title>
<style>
  :root {
    --ink: #2b2620; --paper: #faf7f2; --card: #ffffff;
    --done: #2e7d4f; --doing: #c77b30; --ahead: #c8c2b8; --accent: #b3541e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 2.5rem 1.25rem; background: var(--paper);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
    line-height: 1.5;
  }
  main { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 1.7rem; font-weight: normal; margin: 0 0 .25rem; }
  .sub { color: #7a7268; font-size: .95rem; margin-bottom: 1.75rem; }
  .bar { height: 10px; background: #eee8de; border-radius: 5px; overflow: hidden; margin-bottom: 2rem; }
  .bar > div { height: 100%; background: var(--done); border-radius: 5px; transition: width .6s ease; }
  ol.map { list-style: none; padding: 0; margin: 0 0 2.25rem; }
  ol.map li {
    background: var(--card); border: 1px solid #eee5d8; border-radius: 10px;
    padding: .7rem 1rem; margin-bottom: .5rem;
    display: flex; align-items: baseline; gap: .75rem;
  }
  .dot { font-size: 1.05rem; width: 1.4rem; text-align: center; flex: none; }
  li.done .dot { color: var(--done); }
  li.doing .dot { color: var(--doing); }
  li.ahead { opacity: .62; }
  .num { color: #9a9183; font-size: .85rem; width: 1.4rem; flex: none; }
  .title { flex: 1; }
  .made { display: block; font-size: .85rem; color: #7a7268; font-style: italic; }
  .when { font-size: .8rem; color: #9a9183; flex: none; }
  h2 { font-size: 1.05rem; font-weight: normal; letter-spacing: .06em;
       text-transform: uppercase; color: var(--accent); margin: 0 0 .75rem; }
  ul.kit { list-style: none; padding: 0; margin: 0 0 2.25rem; columns: 2; column-gap: 1.5rem; }
  ul.kit li { padding: .25rem 0; font-size: .95rem; break-inside: avoid; }
  ul.kit li::before { content: "□  "; color: var(--ahead); }
  ul.kit li.have::before { content: "■  "; color: var(--done); }
  footer { color: #9a9183; font-size: .85rem; border-top: 1px solid #eee5d8; padding-top: 1rem; }
  @media (max-width: 540px) { ul.kit { columns: 1; } }
</style>
</head>
<body>
<main>
  <h1 id="headline">My Teach Me Claude journey</h1>
  <div class="sub" id="subline"></div>
  <div class="bar"><div id="barfill" style="width:0%"></div></div>

  <ol class="map" id="map"></ol>

  <h2>The kit</h2>
  <ul class="kit" id="kit"></ul>

  <footer id="foot"></footer>
</main>
<script>
  // The companion replaces the placeholder below with the JSON contents
  // of .teach-me/progress.json when instantiating this template.
  const PROGRESS = __PROGRESS_DATA__;

  const SERIES1 = [
    "Meet your AI coworker", "Your first real delegation", "Say what you mean",
    "Make it grill you", "Trust, but verify", "Compute, don't guess",
    "Big jobs, small pieces", "Give your agent a memory", "Working safely",
    "Build your own machine"
  ];
  const KIT = [
    ["grill_me_skill", "Grill-me skill"], ["brief_template", "Brief template"],
    ["verification_checklist", "Verification checklist"], ["delegation_map", "Delegation map"],
    ["claude_md", "Agent memory (CLAUDE.md)"], ["first_machine", "My first machine"]
  ];

  const learner = (PROGRESS && PROGRESS.learner) || {};
  const challenges = (PROGRESS && PROGRESS.challenges) || {};
  const current = (PROGRESS && PROGRESS.current) || {};

  // Tolerate different key shapes the companion may have used: "3", "03", "1.03"…
  function entryFor(n) {
    const keys = [String(n), String(n).padStart(2, "0"), "1." + String(n).padStart(2, "0"), "1." + n];
    for (const k of keys) if (challenges[k]) return challenges[k];
    return null;
  }

  let done = 0;
  const map = document.getElementById("map");
  SERIES1.forEach((title, i) => {
    const n = i + 1;
    const e = entryFor(n);
    const passed = e && e.status === "passed";
    const doing = !passed && (e ? e.status === "in_progress" : Number(current.challenge) === n);
    if (passed) done++;
    const li = document.createElement("li");
    li.className = passed ? "done" : (doing ? "doing" : "ahead");
    const made = e && (e.note || e.artifact || (Array.isArray(e.artifacts) && e.artifacts.join(", ")));
    li.innerHTML =
      '<span class="dot">' + (passed ? "✓" : (doing ? "▸" : "·")) + "</span>" +
      '<span class="num">' + n + "</span>" +
      '<span class="title">' + title + (made ? '<span class="made"></span>' : "") + "</span>" +
      '<span class="when">' + ((e && e.completed) || "") + "</span>";
    if (made) li.querySelector(".made").textContent = made;
    map.appendChild(li);
  });

  document.getElementById("headline").textContent =
    (learner.name ? learner.name + "’s" : "My") + " Teach Me Claude journey";
  document.getElementById("subline").textContent =
    "Series 1 — Foundations · " + done + " of 10 challenges complete" +
    (learner.started ? " · started " + learner.started : "");
  document.getElementById("barfill").style.width = (done * 10) + "%";

  const kitEl = document.getElementById("kit");
  const kit = (PROGRESS && PROGRESS.kit) || {};
  KIT.forEach(([key, label]) => {
    const li = document.createElement("li");
    if (kit[key]) li.className = "have";
    li.textContent = label;
    kitEl.appendChild(li);
  });

  const refl = (PROGRESS && PROGRESS.reflections || []).length;
  document.getElementById("foot").textContent =
    (refl ? refl + " reflection" + (refl === 1 ? "" : "s") + " recorded · " : "") +
    "This map renders your local progress file — it’s yours.";
</script>
</body>
</html>
