<!DOCTYPE html>
<!--
  Teach Me Claude — journey map widget (template).
  The companion instantiates this into the learner's workspace:
  replace the __PROGRESS_DATA__ placeholder below with the actual JSON
  contents of .teach-me/progress.json, save as my-journey.html, and invite
  the learner to open it in their browser. Render real progress only.

  Styling is the locked Teach Me Claude brand (brand/tokens.css): pine on warm
  ivory, Bricolage Grotesque + Inter, light + dark. Real fonts load from Google
  Fonts when online; the system-font stacks are the offline fallback.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Teach Me Claude journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pine: #1C7D74; --pine-strong: #115A53; --pine-tint: #E4F1F0;
    --paper: #FBF8F2; --surface: #FFFFFF; --surface-2: #F3EDE2;
    --ink: #241F1A; --ink-2: #6E665B; --ink-3: #9A9184; --hairline: #E2D9C9;
    --done: #2E7D4F; --doing: #B26C2A;
    --font-display: 'Bricolage Grotesque', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-text: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --pine: #33C1B3; --pine-strong: #54C9BD; --pine-tint: #1F3D3A;
      --paper: #18140F; --surface: #221C16; --surface-2: #2C251D;
      --ink: #F2ECDF; --ink-2: #B3A998; --ink-3: #837A6B; --hairline: #3A3026;
      --done: #5FB07E; --doing: #E0A35C;
    }
  }
  [data-theme="dark"] {
    --pine: #33C1B3; --pine-strong: #54C9BD; --pine-tint: #1F3D3A;
    --paper: #18140F; --surface: #221C16; --surface-2: #2C251D;
    --ink: #F2ECDF; --ink-2: #B3A998; --ink-3: #837A6B; --hairline: #3A3026;
    --done: #5FB07E; --doing: #E0A35C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 2.5rem 1.25rem; background: var(--paper); color: var(--ink);
    font-family: var(--font-text); line-height: 1.5; -webkit-font-smoothing: antialiased;
  }
  main { max-width: 680px; margin: 0 auto; }
  .mark { width: 30px; height: 30px; display: block; margin-bottom: .85rem; }
  h1 { font-family: var(--font-display); font-size: 1.7rem; font-weight: 600; letter-spacing: -.01em; margin: 0 0 .3rem; }
  .sub { color: var(--ink-2); font-size: .95rem; margin-bottom: 1.75rem; }
  .bar { height: 10px; background: var(--surface-2); border-radius: 999px; overflow: hidden; margin-bottom: 2rem; }
  .bar > div { height: 100%; background: var(--pine); border-radius: 999px; transition: width .6s ease; }
  ol.map { list-style: none; padding: 0; margin: 0 0 2.25rem; }
  ol.map li {
    background: var(--surface); border: 1px solid var(--hairline); border-radius: 10px;
    padding: .7rem 1rem; margin-bottom: .5rem; display: flex; align-items: baseline; gap: .75rem;
  }
  .dot { font-size: 1.05rem; width: 1.4rem; text-align: center; flex: none; color: var(--ink-3); }
  li.done .dot { color: var(--done); }
  li.doing .dot { color: var(--doing); }
  li.doing { border-color: var(--doing); }
  li.ahead { opacity: .6; }
  .num { color: var(--ink-3); font-size: .85rem; width: 1.4rem; flex: none; font-variant-numeric: tabular-nums; }
  .title { flex: 1; }
  .made { display: block; font-size: .85rem; color: var(--ink-2); font-style: italic; }
  .when { font-size: .8rem; color: var(--ink-3); flex: none; }
  h2 { font-family: var(--font-text); font-size: .8rem; font-weight: 600; letter-spacing: .1em;
       text-transform: uppercase; color: var(--pine-strong); margin: 0 0 .75rem; }
  ul.kit { list-style: none; padding: 0; margin: 0 0 2.25rem; columns: 2; column-gap: 1.5rem; }
  ul.kit li { padding: .25rem 0; font-size: .95rem; break-inside: avoid; color: var(--ink-2); }
  ul.kit li::before { content: "□  "; color: var(--ink-3); }
  ul.kit li.have { color: var(--ink); }
  ul.kit li.have::before { content: "■  "; color: var(--done); }
  footer { color: var(--ink-3); font-size: .85rem; border-top: 1px solid var(--hairline); padding-top: 1rem; }
  @media (max-width: 540px) { ul.kit { columns: 1; } }
</style>
</head>
<body>
<main>
  <svg class="mark" viewBox="0 0 100 100" aria-hidden="true" fill="none" stroke="var(--pine)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M35 38 L50 27 L65 38"/><path d="M31 53 L50 42 L69 53"/><path d="M27 68 L50 57 L73 68"/>
  </svg>
  <h1 id="headline">My Teach Me Claude journey</h1>
  <div class="sub" id="subline"></div>
  <div class="bar"><div id="barfill" style="width:0%"></div></div>

  <ol class="map" id="map"></ol>

  <h2>The kit</h2>
  <ul class="kit" id="kit"></ul>

  <footer id="foot"></footer>
</main>
<script>
  // The companion replaces the placeholder below with the JSON contents
  // of .teach-me/progress.json when instantiating this template.
  const PROGRESS = __PROGRESS_DATA__;

  const SERIES1 = [
    "Meet your AI coworker", "Your first real delegation", "Say what you mean",
    "Make it grill you", "Trust, but verify", "Compute, don't guess",
    "Big jobs, small pieces", "Give your agent a memory", "Working safely",
    "Build your own machine"
  ];
  const KIT = [
    ["grill_me_skill", "Grill-me skill"], ["brief_template", "Brief template"],
    ["verification_checklist", "Verification checklist"], ["delegation_map", "Delegation map"],
    ["claude_md", "Agent memory (CLAUDE.md)"], ["first_machine", "My first machine"]
  ];

  const learner = (PROGRESS && PROGRESS.learner) || {};
  const challenges = (PROGRESS && PROGRESS.challenges) || {};
  const current = (PROGRESS && PROGRESS.current) || {};

  // Tolerate different key shapes the companion may have used: "3", "03", "1.03"…
  function entryFor(n) {
    const keys = [String(n), String(n).padStart(2, "0"), "1." + String(n).padStart(2, "0"), "1." + n];
    for (const k of keys) if (challenges[k]) return challenges[k];
    return null;
  }

  let done = 0;
  const map = document.getElementById("map");
  SERIES1.forEach((title, i) => {
    const n = i + 1;
    const e = entryFor(n);
    const passed = e && e.status === "passed";
    const doing = !passed && (e ? e.status === "in_progress" : Number(current.challenge) === n);
    if (passed) done++;
    const li = document.createElement("li");
    li.className = passed ? "done" : (doing ? "doing" : "ahead");
    const made = e && (e.note || e.artifact || (Array.isArray(e.artifacts) && e.artifacts.join(", ")));
    li.innerHTML =
      '<span class="dot">' + (passed ? "✓" : (doing ? "▸" : "·")) + "</span>" +
      '<span class="num">' + n + "</span>" +
      '<span class="title">' + title + (made ? '<span class="made"></span>' : "") + "</span>" +
      '<span class="when">' + ((e && e.completed) || "") + "</span>";
    if (made) li.querySelector(".made").textContent = made;
    map.appendChild(li);
  });

  document.getElementById("headline").textContent =
    (learner.name ? learner.name + "’s" : "My") + " Teach Me Claude journey";
  document.getElementById("subline").textContent =
    "Series 1 — Foundations · " + done + " of 10 challenges complete" +
    (learner.started ? " · started " + learner.started : "");
  document.getElementById("barfill").style.width = (done * 10) + "%";

  const kitEl = document.getElementById("kit");
  const kit = (PROGRESS && PROGRESS.kit) || {};
  KIT.forEach(([key, label]) => {
    const li = document.createElement("li");
    if (kit[key]) li.className = "have";
    li.textContent = label;
    kitEl.appendChild(li);
  });

  const refl = (PROGRESS && PROGRESS.reflections || []).length;
  document.getElementById("foot").textContent =
    (refl ? refl + " reflection" + (refl === 1 ? "" : "s") + " recorded · " : "") +
    "This map renders your local progress file — it’s yours.";
</script>
</body>
</html>
