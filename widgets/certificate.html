<!DOCTYPE html>
<!--
  Teach Me Claude — graduation certificate widget (template).
  The companion instantiates this when a series capstone passes:
  fill the four placeholders below from real progress data —
    __NAME__      the learner's name
    __SERIES__    e.g. "Series 1 — Foundations"
    __CAPSTONE__  one line on what they built ("a weekly report machine
                  for her client updates")
    __DATE__      completion date, written out
  — save into the workspace (e.g. foundations-certificate.html) and invite
  the learner to open or print it. Never fabricate its contents.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teach Me Claude — Certificate</title>
<style>
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center;
    justify-content: center; background: #efe9df; padding: 2rem;
    font-family: Georgia, "Times New Roman", serif; color: #2b2620;
  }
  .cert {
    background: #fffdf8; max-width: 720px; width: 100%;
    padding: 3.5rem 3rem; text-align: center;
    border: 1px solid #d8cfbf; outline: 6px double #b3541e; outline-offset: -18px;
    box-shadow: 0 14px 40px rgba(43, 38, 32, .18);
  }
  .small-caps { letter-spacing: .28em; text-transform: uppercase; font-size: .75rem; color: #b3541e; }
  h1 { font-weight: normal; font-size: 2rem; margin: 1rem 0 .25rem; }
  .series { font-style: italic; color: #7a7268; margin-bottom: 2rem; }
  .name { font-size: 2.4rem; margin: 1.25rem 0 .5rem; }
  .line { width: 220px; border-bottom: 1px solid #b9ae9c; margin: 0 auto 1.5rem; }
  p { max-width: 480px; margin: 0 auto 1rem; line-height: 1.6; }
  .capstone { font-style: italic; }
  .date { margin-top: 2.25rem; color: #7a7268; font-size: .95rem; }
  .seal {
    width: 86px; height: 86px; margin: 2rem auto 0; border-radius: 50%;
    border: 2px solid #b3541e; color: #b3541e; display: flex; align-items: center;
    justify-content: center; font-size: .65rem; letter-spacing: .14em;
    text-transform: uppercase; line-height: 1.3; padding: .5rem;
  }
  @media print {
    body { background: #fff; padding: 0; }
    .cert { box-shadow: none; }
  }
</style>
</head>
<body>
  <div class="cert">
    <div class="small-caps">Teach Me Claude</div>
    <h1>Certificate of Completion</h1>
    <div class="series">__SERIES__</div>
    <p>This certifies that</p>
    <div class="name">__NAME__</div>
    <div class="line"></div>
    <p>completed all ten challenges of this series — graduating with a
       working personal toolkit and, as a capstone,
       <span class="capstone">__CAPSTONE__</span>.</p>
    <div class="date">__DATE__</div>
    <div class="seal">Coached ·&nbsp;Graded ·&nbsp;Earned</div>
  </div>
</body>
</html>
