<!DOCTYPE html>
<!--
  Teach Me Claude — graduation certificate widget (template).
  The companion instantiates this when a series capstone passes:
  fill the four placeholders below from real progress data —
    __NAME__      the learner's name
    __SERIES__    e.g. "Series 1 — Foundations"
    __CAPSTONE__  one line on what they built ("a weekly report machine
                  for her client updates")
    __DATE__      completion date, written out
  — save into the workspace (e.g. foundations-certificate.html) and invite
  the learner to open or print it. Never fabricate its contents.

  Styling is the locked Teach Me Claude brand (brand/tokens.css): pine on warm
  ivory, Bricolage Grotesque + Inter. Real fonts load from Google Fonts when
  online; the system-font stacks below are the offline/​print fallback.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teach Me Claude — Certificate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* brand tokens (light) */
    --pine: #1C7D74; --pine-strong: #115A53; --pine-tint: #E4F1F0;
    --paper: #FBF8F2; --surface: #FFFFFF; --surface-2: #F3EDE2;
    --ink: #241F1A; --ink-2: #6E665B; --ink-3: #9A9184; --hairline: #E2D9C9;
    --font-display: 'Bricolage Grotesque', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-text: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --r-lg: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center;
    justify-content: center; background: var(--surface-2); padding: 2rem;
    font-family: var(--font-text); color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .cert {
    position: relative; background: var(--paper); max-width: 720px; width: 100%;
    padding: 3.75rem 3.25rem 3.25rem; text-align: center;
    border: 1px solid var(--hairline); border-radius: var(--r-lg);
    box-shadow: 0 18px 50px rgba(36, 31, 26, .12);
  }
  /* inner pine frame (replaces the old double terracotta rule) */
  .cert::before {
    content: ""; position: absolute; inset: 14px;
    border: 1.5px solid var(--pine); border-radius: 8px; pointer-events: none;
  }
  .cert > * { position: relative; }

  .brand { display: flex; flex-direction: column; align-items: center; gap: .5rem; margin-bottom: 2rem; }
  .brand .mark { width: 46px; height: 46px; display: block; }
  .wordmark { font-family: var(--font-display); font-weight: 600; font-size: 1.25rem; letter-spacing: -.01em; color: var(--ink); }
  .wordmark b { font-weight: 600; color: var(--pine-strong); }

  .eyebrow { font-family: var(--font-text); font-weight: 500; letter-spacing: .26em; text-transform: uppercase; font-size: .7rem; color: var(--pine-strong); }
  h1 { font-family: var(--font-display); font-weight: 600; font-size: 2.1rem; line-height: 1.1; margin: .85rem 0 .35rem; color: var(--ink); }
  .series { font-family: var(--font-text); color: var(--ink-2); margin-bottom: 2rem; }
  .lead { max-width: 480px; margin: 0 auto .75rem; line-height: 1.65; color: var(--ink-2); }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 2.4rem; line-height: 1.1; margin: .5rem 0 .65rem; color: var(--ink); }
  .rule { width: 220px; border-bottom: 1px solid var(--hairline); margin: 0 auto 1.6rem; }
  .body { max-width: 500px; margin: 0 auto; line-height: 1.7; color: var(--ink); }
  .capstone { font-style: italic; color: var(--pine-strong); }
  .date { margin-top: 2.25rem; color: var(--ink-3); font-size: .95rem; font-family: var(--font-text); }
  .seal { width: 104px; height: 104px; margin: 1.75rem auto 0; display: block; }

  @media print {
    body { background: #fff; padding: 0; }
    .cert { box-shadow: none; border-radius: 0; }
  }
  @media (max-width: 560px) {
    .cert { padding: 2.5rem 1.5rem; } h1 { font-size: 1.8rem; } .name { font-size: 2rem; }
  }
</style>
</head>
<body>
  <div class="cert">
    <div class="brand">
      <svg class="mark" viewBox="0 0 100 100" aria-hidden="true" fill="none" stroke="var(--pine)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M35 38 L50 27 L65 38"/><path d="M31 53 L50 42 L69 53"/><path d="M27 68 L50 57 L73 68"/>
      </svg>
      <div class="wordmark">Teach Me <b>Claude</b></div>
    </div>

    <h1>Certificate of Completion</h1>
    <div class="series">__SERIES__</div>

    <p class="lead">This certifies that</p>
    <div class="name">__NAME__</div>
    <div class="rule"></div>
    <p class="body">completed all ten challenges of this series — graduating with a
       working personal toolkit and, as a capstone,
       <span class="capstone">__CAPSTONE__</span>.</p>

    <div class="date">__DATE__</div>

    <svg class="seal" viewBox="0 0 120 120" role="img" aria-label="Coached, Graded, Earned seal">
      <defs>
        <path id="sealArc" d="M60 60 m -44 0 a 44 44 0 1 1 88 0 a 44 44 0 1 1 -88 0"/>
      </defs>
      <circle cx="60" cy="60" r="56" fill="none" stroke="var(--pine)" stroke-width="1.5" stroke-dasharray="2.5 4"/>
      <circle cx="60" cy="60" r="48" fill="none" stroke="var(--pine)" stroke-width="1"/>
      <text fill="var(--pine-strong)" font-family="var(--font-text)" font-size="8.4" font-weight="600" letter-spacing="2.6">
        <textPath href="#sealArc" startOffset="50%" text-anchor="middle">COACHED · GRADED · EARNED</textPath>
      </text>
      <path d="M47 60.5 l8.5 9 l18.5 -20.5" fill="none" stroke="var(--pine)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</body>
</html>
