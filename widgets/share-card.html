<!DOCTYPE html>
<!--
  Teach Me Claude — completion share-card (template, 1200×630 / LinkedIn-og ratio).
  The learning guide instantiates this when a learner finishes a series and wants to
  share it: fill the placeholders, then render to PNG (e.g. with the project's
  html→png step) for them to post.
    __NAME__      the learner's name
    __SERIES__    e.g. "Series 1 — Foundations"
    __CAPSTONE__  one line on what they built
  Locked brand (brand/tokens.css): bold pine, reversed lockup, gold accent.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pine: #1C7D74; --pine-strong: #115A53; --paper: #FBF8F2; --gold: #E7B040;
    --font-display: 'Bricolage Grotesque', system-ui, sans-serif;
    --font-text: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { width: 1200px; height: 630px; }
  body {
    position: relative;
    background: var(--pine); color: var(--paper); font-family: var(--font-text);
    -webkit-font-smoothing: antialiased; overflow: hidden;
    display: flex; align-items: flex-start; gap: 56px; padding: 54px 80px;
  }
  .content { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .lockup { flex: none; display: flex; align-items: center; gap: 16px; }
  .body { margin-top: 40px; }
  .lockup .mark { width: 44px; height: 44px; display: block; }
  .lockup .wm { font-family: var(--font-display); font-weight: 600; font-size: 30px; letter-spacing: -.01em; color: var(--paper); }
  .eyebrow { font-weight: 600; letter-spacing: .16em; text-transform: uppercase; font-size: 17px; color: var(--gold); margin-bottom: 18px; }
  h1 { font-family: var(--font-display); font-weight: 600; font-size: 56px; line-height: 1.06; letter-spacing: -.02em; color: var(--paper); }
  .awarded { margin-top: 24px; font-size: 23px; color: var(--paper); }
  .awarded b { font-weight: 600; }
  .capstone { margin-top: 8px; font-size: 20px; font-style: italic; color: rgba(251,248,242,.82); max-width: 560px; line-height: 1.4; }
  .url { margin-top: 32px; font-size: 18px; letter-spacing: .01em; color: rgba(251,248,242,.74); }
  /* earned badge — the Climb mark in a paper ring (reversed seal, no text) */
  .badge { flex: none; align-self: center; width: 240px; height: 240px; position: relative; }
  .badge svg { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
  <div class="content">
    <div class="lockup">
      <svg class="mark" viewBox="0 0 100 100" aria-hidden="true" fill="none" stroke="var(--paper)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M35 38 L50 27 L65 38"/><path d="M31 53 L50 42 L69 53"/><path d="M27 68 L50 57 L73 68"/>
      </svg>
      <span class="wm">Teach Me Claude</span>
    </div>

    <div class="body">
      <div class="eyebrow">__SERIES__ · Complete</div>
      <h1>Coached.<br>Graded.<br>Earned.</h1>
      <div class="awarded">Awarded to <b>__NAME__</b></div>
      <div class="capstone">Capstone — __CAPSTONE__.</div>
    </div>

    <div class="url">teachmeclaude.ai</div>
  </div>

  <div class="badge">
    <svg viewBox="0 0 240 240" role="img" aria-label="Teach Me Claude — earned">
      <circle cx="120" cy="120" r="116" fill="var(--pine-strong)"/>
      <circle cx="120" cy="120" r="108" fill="none" stroke="var(--paper)" stroke-width="2" stroke-dasharray="2.5 6" opacity=".85"/>
      <circle cx="120" cy="120" r="96" fill="none" stroke="var(--paper)" stroke-width="1.5" opacity=".5"/>
      <g transform="translate(30 34.5) scale(1.8)" fill="none" stroke="var(--paper)" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M35 38 L50 27 L65 38"/><path d="M31 53 L50 42 L69 53"/><path d="M27 68 L50 57 L73 68"/>
      </g>
    </svg>
  </div>
</body>
</html>
